# ============================================================
# GitHub Actions: 自动 Release
# 触发: push tag 匹配 v* (如 v1.3.0, v1.4.0, v2.0.0)
# 作用: 自动创建 GitHub Release + 上传 source archives
# ============================================================
name: 🚀 Release

on:
  push:
    tags:
      - 'v*.*.*'  # 匹配 v1.3.0, v1.3.1, v2.0.0 等
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write    # 创建 release 需要写权限

jobs:
  release:
    name: 📦 Build & Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉全部历史 (auto-generated notes 需要)
      
      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 🏗️ 构建源码包 (sdist + wheel)
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist --wheel --outdir dist/
          ls -la dist/
      
      - name: 📝 准备 release notes
        id: notes
        run: |
          # 自动从 commits + PRs 生成 notes
          # 也可以用 ${{ github.event.release.body }} 从触发器传
          cat > release_notes.md <<'NOTES'
          ## 📦 自动 Release
          
          这个 release 由 GitHub Actions 自动创建。
          
          ### 变更内容
          ${{ github.event.head_commit.message }}
          
          ### 完整变更
          查看 [commit 历史](${{ github.server_url }}/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.ref }})
          
          ### 资产
          - `Source code (tar.gz)` / `Source code (zip)` - GitHub 自动生成
          - `*.whl` - Python wheel 包 (`pip install`)
          - `*.tar.gz` - Python source distribution
          NOTES
          echo "notes_file=release_notes.md" >> $GITHUB_OUTPUT
      
      - name: 🚀 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }} - 自动 Release"
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true  # 用 GitHub 内置的 auto notes (从 PRs/commits 提取)
          files: |
            dist/*.tar.gz
            dist/*.whl
      
      - name: 📢 通知 (可选)
        if: success()
        run: |
          echo "✅ Release ${{ github.ref_name }} 已发布"
          echo "🔗 ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
